appId: com.projecthelix.desktop

productName: Project Helix

artifactName: "${productName}-Setup-${version}.${ext}"

directories:
  output: release

files:
  - dist/**
  - package.json

extraMetadata:
  main: dist/main/main.js

asar: true

win:
  target:
    - nsis
  icon: build/icon.ico

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: always
  createStartMenuShortcut: true

publish:
  provider: github
  owner: ResearchProjectHelix
  repo: Project-Helix
  releaseType: release
  publishAutoUpdate: true